name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  packages: write

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crucible_test
          POSTGRES_USER: crucible
          POSTGRES_PASSWORD: crucible
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Tidy
        working-directory: api
        run: go mod tidy

      - name: Run migrations
        working-directory: api
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: crucible_test
          POSTGRES_USER: crucible
          POSTGRES_PASSWORD: crucible
          CRUCIBLE_SECRET_KEY: ci-placeholder
          OIDC_ISSUER_URL: https://placeholder.example.com
        run: go run ./cmd/crucible-iap migrate

      - name: Vet
        working-directory: api
        run: go vet ./...

      - name: Test
        working-directory: api
        env:
          TEST_DATABASE_URL: postgres://crucible:crucible@localhost:5432/crucible_test?sslmode=disable
        run: go test -race ./...

      - name: Build
        working-directory: api
        run: go build ./cmd/crucible-iap

      - name: Commit go.sum if changed
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update go.sum"
          file_pattern: "api/go.sum api/go.mod"

  ui:
    name: UI (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: ""

      - name: Install
        working-directory: ui
        run: pnpm install --no-frozen-lockfile

      - name: Sync SvelteKit types
        working-directory: ui
        run: pnpm svelte-kit sync

      - name: Check types
        working-directory: ui
        run: pnpm svelte-check

      - name: Build
        working-directory: ui
        run: pnpm build

      - name: Commit lockfile if changed
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update pnpm-lock.yaml"
          file_pattern: "ui/pnpm-lock.yaml"

  lint:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Install linters
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          go install github.com/client9/misspell/cmd/misspell@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/gordonklaus/ineffassign@latest

      - name: gofmt
        run: gofmt -w api/

      - name: Commit gofmt changes
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: gofmt"
          file_pattern: "api/**/*.go"

      - name: go vet
        working-directory: api
        run: go vet ./...

      - name: staticcheck
        working-directory: api
        run: staticcheck ./...

      - name: gocyclo
        run: gocyclo -over 15 api/

      - name: ineffassign
        working-directory: api
        run: ineffassign ./...

      - name: misspell
        run: misspell -error api/ runner/ docs/ README.md

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [api, ui, lint]
    if: github.event_name == 'push'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=edge" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ponack/crucible-iap-api
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: UI image metadata
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ponack/crucible-iap-ui
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Runner image metadata
        id: meta-runner
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ponack/crucible-iap-runner
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.ui
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push runner image
        id: build-runner
        uses: docker/build-push-action@v6
        with:
          context: runner
          file: runner/Dockerfile
          push: true
          tags: ${{ steps.meta-runner.outputs.tags }}
          labels: ${{ steps.meta-runner.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3

      - name: Sign runner image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cosign sign --yes \
            ghcr.io/ponack/crucible-iap-runner@${{ steps.build-runner.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists — skipping creation."
          else
            gh release create "${{ github.ref_name }}" \
              --title "Crucible IAP ${{ github.ref_name }}" \
              --generate-notes \
              --verify-tag
          fi
