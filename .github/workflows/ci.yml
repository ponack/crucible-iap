name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  packages: write

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crucible_test
          POSTGRES_USER: crucible
          POSTGRES_PASSWORD: crucible
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Tidy
        working-directory: api
        run: go mod tidy

      - name: Run migrations
        working-directory: api
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: crucible_test
          POSTGRES_USER: crucible
          POSTGRES_PASSWORD: crucible
          CRUCIBLE_SECRET_KEY: ci-placeholder
          OIDC_ISSUER_URL: https://placeholder.example.com
        run: go run ./cmd/crucible-iap migrate

      - name: Vet
        working-directory: api
        run: go vet ./...

      - name: Test
        working-directory: api
        env:
          TEST_DATABASE_URL: postgres://crucible:crucible@localhost:5432/crucible_test?sslmode=disable
        run: go test -race ./...

      - name: Build
        working-directory: api
        run: go build ./cmd/crucible-iap

      - name: Commit go.sum if changed
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: update go.sum"
          file_pattern: "api/go.sum api/go.mod"

  ui:
    name: UI (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: ""

      - name: Install
        working-directory: ui
        run: pnpm install --no-frozen-lockfile

      - name: Sync SvelteKit types
        working-directory: ui
        run: pnpm svelte-kit sync

      - name: Check types
        working-directory: ui
        run: pnpm svelte-check

      - name: Build
        working-directory: ui
        run: pnpm build

      - name: Commit lockfile if changed
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: update pnpm-lock.yaml"
          file_pattern: "ui/pnpm-lock.yaml"

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [api, ui]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ponack/crucible-iap-api
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: UI image metadata
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ponack/crucible-iap-ui
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Runner image metadata
        id: meta-runner
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ponack/crucible-iap-runner
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.ui
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: runner
          file: runner/Dockerfile
          push: true
          tags: ${{ steps.meta-runner.outputs.tags }}
          labels: ${{ steps.meta-runner.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Crucible IAP ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
