name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Tidy
        working-directory: api
        run: go mod tidy

      - name: Vet
        working-directory: api
        run: go vet ./...

      - name: Test
        working-directory: api
        run: go test -race ./...

      - name: Build
        working-directory: api
        run: go build ./cmd/crucible-iap

      - name: Commit go.sum if changed
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update go.sum"
          file_pattern: "api/go.sum api/go.mod"

  ui:
    name: UI (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: ""

      - name: Install
        working-directory: ui
        run: pnpm install --no-frozen-lockfile

      - name: Sync SvelteKit types
        working-directory: ui
        run: pnpm svelte-kit sync

      - name: Check types
        working-directory: ui
        run: pnpm svelte-check

      - name: Build
        working-directory: ui
        run: pnpm build

      - name: Commit lockfile if changed
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update pnpm-lock.yaml"
          file_pattern: "ui/pnpm-lock.yaml"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [api, ui]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.ui
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build runner image
        uses: docker/build-push-action@v6
        with:
          context: runner
          file: runner/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
