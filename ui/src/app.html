<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<!-- Resolve theme before first paint to avoid flash of wrong theme -->
		<script>
			(function () {
				try {
					var s = localStorage.getItem('theme');
					var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var t = s || (d ? 'dark' : 'light');
					var h = document.documentElement;
					h.classList.remove('dark', 'light');
					h.classList.add(t);
				} catch (e) {}
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="16x16 32x32 48x48" type="image/x-icon" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" sizes="64x64" type="image/png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-256.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Crucible IAP — Infrastructure Automation Platform" />
		<meta property="og:title" content="Crucible IAP" />
		<meta property="og:description" content="Self-hosted infrastructure automation platform" />
		<meta property="og:image" content="%sveltekit.assets%/social-preview.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="%sveltekit.assets%/social-preview.png" />
		%sveltekit.head%
	</head>
	<body class="antialiased" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
