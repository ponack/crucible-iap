name: crucible-iap

# Production Docker Compose for Crucible IAP.
# Copy .env.example to .env and fill in all required values before starting.
#
# Default profile (bundled Caddy reverse proxy):
#   docker compose up -d
#
# External reverse proxy (nginx, Caddy on host, etc.):
#   docker compose --profile external-proxy up -d
#
# Bundled Authentik IdP:
#   docker compose --profile authentik up -d
#
# Updating:
#   docker compose pull && docker compose up -d
#   docker compose exec crucible-api /crucible-iap migrate
#
# Services:
#   crucible-api    — HTTP API server (no Docker socket needed)
#   crucible-worker — River job worker + Docker runner (has Docker socket)
#   crucible-ui     — SvelteKit UI

services:

  # ── API ─────────────────────────────────────────────────────────────────────
  crucible-api:
    image: ghcr.io/ponack/crucible-iap-api:${CRUCIBLE_VERSION:-latest}
    restart: unless-stopped
    env_file: ../.env
    environment:
      CRUCIBLE_ENV: production
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal
      # API must be on the runner network so ephemeral containers can reach
      # the state backend and callback endpoints without going via the public URL.
      - crucible-runner

  # ── Worker ───────────────────────────────────────────────────────────────────
  crucible-worker:
    image: ghcr.io/ponack/crucible-iap-api:${CRUCIBLE_VERSION:-latest}
    command: ["worker"]
    restart: unless-stopped
    env_file: ../.env
    environment:
      # URL runner containers use to reach the API for state backend callbacks.
      # Must be the internal Docker service name, not the public URL.
      RUNNER_API_URL: ${RUNNER_API_URL:-http://crucible-api:8080}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      crucible-api:
        condition: service_healthy
    volumes:
      # Docker socket for spawning ephemeral runner containers.
      # Use DOCKER_HOST in .env instead if targeting a remote Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
      # Must share the runner network with the API so that spawned containers
      # can reach both the worker (for log streaming) and the API (callbacks).
      - crucible-runner

  # ── UI ──────────────────────────────────────────────────────────────────────
  crucible-ui:
    image: ghcr.io/ponack/crucible-iap-ui:${CRUCIBLE_VERSION:-latest}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    networks:
      - internal

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crucible}
      POSTGRES_USER: ${POSTGRES_USER:-crucible}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crucible} -d ${POSTGRES_DB:-crucible}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
    ports:
      # MinIO console — accessible directly; Caddy does NOT proxy this.
      - "${CRUCIBLE_API_EXPOSE:-127.0.0.1}:9001:9001"
    networks:
      - internal

  # ── Caddy (bundled reverse proxy, default profile) ───────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      CRUCIBLE_BASE_URL: ${CRUCIBLE_BASE_URL:-https://localhost}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - crucible-api
      - crucible-ui
    networks:
      - internal

  # ── API + UI exposed on host ports (external-proxy profile) ─────────────────
  # Use instead of Caddy when TLS termination is handled externally.
  crucible-api-proxy:
    image: ghcr.io/ponack/crucible-iap-api:${CRUCIBLE_VERSION:-latest}
    restart: unless-stopped
    env_file: ../.env
    environment:
      CRUCIBLE_ENV: production
    ports:
      - "${CRUCIBLE_API_EXPOSE:-127.0.0.1}:${CRUCIBLE_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - internal
      - crucible-runner
    profiles:
      - external-proxy

  crucible-worker-proxy:
    image: ghcr.io/ponack/crucible-iap-api:${CRUCIBLE_VERSION:-latest}
    command: ["worker"]
    restart: unless-stopped
    env_file: ../.env
    environment:
      RUNNER_API_URL: ${RUNNER_API_URL:-http://crucible-api-proxy:8080}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      crucible-api-proxy:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
      - crucible-runner
    profiles:
      - external-proxy

  crucible-ui-proxy:
    image: ghcr.io/ponack/crucible-iap-ui:${CRUCIBLE_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${CRUCIBLE_UI_EXPOSE:-127.0.0.1}:${CRUCIBLE_UI_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    networks:
      - internal
    profiles:
      - external-proxy

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - internal

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${CRUCIBLE_BASE_URL:-https://localhost}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    ports:
      - "${CRUCIBLE_GRAFANA_EXPOSE:-127.0.0.1}:${CRUCIBLE_GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - internal

  # ── Authentik (optional bundled IdP) ────────────────────────────────────────
  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-crucible}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@example.com}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    expose:
      - "9000"
    ports:
      - "${AUTHENTIK_EXPOSE:-127.0.0.1}:${AUTHENTIK_PORT:-9000}:9000"
    depends_on:
      - postgres
      - authentik-redis
    networks:
      - internal
    profiles:
      - authentik

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-crucible}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - postgres
      - authentik-redis
    networks:
      - internal
    profiles:
      - authentik

  authentik-redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    profiles:
      - authentik

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

networks:
  internal:
    driver: bridge
  # Dedicated network for ephemeral runner containers.
  # Declared external so Docker Compose uses the pre-existing network (created
  # by the operator via `docker network create crucible-runner`) rather than
  # creating a project-prefixed copy (crucible-iap_crucible-runner). This
  # ensures the API container and dynamically-spawned runner containers share
  # the same network and can communicate directly.
  # Create once on the host before first `docker compose up`:
  #   docker network create crucible-runner
  crucible-runner:
    external: true
    name: crucible-runner
