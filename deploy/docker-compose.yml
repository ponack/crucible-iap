name: crucible-iap

# ── Profiles ──────────────────────────────────────────────────────────────────
# Always run from the repo root so .env is found automatically, or pass it
# explicitly with --env-file:
#
#   docker compose -f deploy/docker-compose.yml up -d
#   docker compose --env-file .env -f deploy/docker-compose.yml up -d
#
# Default (no profile): bundled Caddy handles TLS + routing.
#   docker compose -f deploy/docker-compose.yml up -d
#
# External reverse proxy: omit Caddy, expose ports directly.
#   docker compose -f deploy/docker-compose.yml --profile external-proxy up -d
#
# Bundled Authentik IdP (either profile):
#   docker compose -f deploy/docker-compose.yml --profile authentik up -d

services:

  # ── Bundled reverse proxy (default) ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["", "caddy"]   # active when no profile is specified
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: ../.env
    depends_on:
      - crucible-api
      - crucible-ui
    networks:
      - frontend

  # ── API (Go backend) ──────────────────────────────────────────────────────────
  crucible-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: ghcr.io/ponack/crucible-iap-api:latest
    restart: unless-stopped
    environment:
      CRUCIBLE_ENV: production
      CRUCIBLE_BASE_URL: "${CRUCIBLE_BASE_URL}"
      CRUCIBLE_SECRET_KEY: "${CRUCIBLE_SECRET_KEY}"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-crucible}"
      POSTGRES_USER: "${POSTGRES_USER:-crucible}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-minio:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET_STATE: "${MINIO_BUCKET_STATE:-crucible-state}"
      MINIO_BUCKET_ARTIFACTS: "${MINIO_BUCKET_ARTIFACTS:-crucible-artifacts}"
      MINIO_USE_SSL: "${MINIO_USE_SSL:-false}"
      OIDC_ISSUER_URL: "${OIDC_ISSUER_URL:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_REDIRECT_URL: "${OIDC_REDIRECT_URL:-}"
      LOCAL_AUTH_ENABLED: "${LOCAL_AUTH_ENABLED:-false}"
      LOCAL_AUTH_EMAIL: "${LOCAL_AUTH_EMAIL:-}"
      LOCAL_AUTH_PASSWORD: "${LOCAL_AUTH_PASSWORD:-}"
    # When using an external proxy, expose the API port directly.
    # Set CRUCIBLE_API_PORT in .env (default 8080) or leave unset for internal-only.
    ports:
      - "${CRUCIBLE_API_EXPOSE:-127.0.0.1}:${CRUCIBLE_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - frontend
      - backend
      - runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── UI (SvelteKit SSR) ────────────────────────────────────────────────────────
  crucible-ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ui
    image: ghcr.io/ponack/crucible-iap-ui:latest
    restart: unless-stopped
    environment:
      PORT: "3000"
      ORIGIN: "${CRUCIBLE_BASE_URL}"
    ports:
      - "${CRUCIBLE_UI_EXPOSE:-127.0.0.1}:${CRUCIBLE_UI_PORT:-3000}:3000"
    networks:
      - frontend

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-crucible}"
      POSTGRES_USER: "${POSTGRES_USER:-crucible}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crucible}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - minio_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Authentik (optional bundled IdP) ─────────────────────────────────────────
  # Activate with: --profile authentik
  # Skip this if you use an external IdP (Okta, GitHub, Keycloak, etc.)
  authentik-server:
    image: ghcr.io/goauthentik/server:2025.2
    restart: unless-stopped
    profiles: ["authentik"]
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: "${POSTGRES_USER:-crucible}"
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: "${POSTGRES_PASSWORD}"
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY}"
      AUTHENTIK_BOOTSTRAP_EMAIL: "${AUTHENTIK_BOOTSTRAP_EMAIL}"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "${AUTHENTIK_BOOTSTRAP_PASSWORD}"
    ports:
      - "${AUTHENTIK_EXPOSE:-127.0.0.1}:${AUTHENTIK_PORT:-9000}:9000"
    depends_on:
      - postgres
      - authentik-redis
    networks:
      - frontend
      - backend

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.2
    restart: unless-stopped
    profiles: ["authentik"]
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: "${POSTGRES_USER:-crucible}"
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: "${POSTGRES_PASSWORD}"
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY}"
    depends_on:
      - postgres
      - authentik-redis
    networks:
      - backend

  authentik-redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["authentik"]
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - authentik_redis:/data
    networks:
      - backend

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  runner:
    name: crucible-runner
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
  authentik_redis:
