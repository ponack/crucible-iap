name: crucible-iap-dev

# Starts only the infrastructure dependencies for local development.
# Run the API and UI natively: make dev-api && make dev-ui

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crucible
      POSTGRES_USER: crucible
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_dev:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_dev:/data

volumes:
  postgres_dev:
  minio_dev:

networks:
  crucible-runner:
    driver: bridge
