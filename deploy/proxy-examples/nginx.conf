# Crucible IAP — nginx reverse proxy example
#
# Requirements:
#   - TLS certificate already provisioned (certbot, internal CA, etc.)
#   - Crucible running with external-proxy profile:
#       docker compose --profile external-proxy up -d
#   - API bound to 127.0.0.1:8080, UI bound to 127.0.0.1:3000 (default)
#
# Place in /etc/nginx/sites-available/crucible-iap and symlink to sites-enabled.

upstream crucible_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream crucible_ui {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name crucible.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crucible.example.com;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/crucible.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crucible.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    server_tokens off;

    # ── Auth + API → Go backend ───────────────────────────────────────────────
    location ~ ^/(auth|api|health) {
        proxy_pass         http://crucible_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE log streaming — disable buffering
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # ── UI → SvelteKit ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://crucible_ui;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
